<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bread plus</title>
        <link rel="stylesheet" href="css/style.css"
    </head>
    <body>
        <h2>Currency converter</h2>
        <p>Insira um valor em dólar para converter para real</p>
	<label for="preco">$:</label>
	<input 
	  type="number" 
	  id="price" 
	  name="price" 
	  step="1" 
	  min="0.99" 
	  inputmode="decimal">

        <button onclick="convertCurrency('USD-BRL', document.getElementById('price').value)">Gerar conversão</button>
        <div id="text"></div>
        <script src="js/script.js"></script>
    </body>
</html>
