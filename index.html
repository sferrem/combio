<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="CombiO" content="converta moedas em uma única página">
        <title>CombiO</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="manifest" href="manifest.json">
	<link rel="icon" href="assets/icons/512.png">
    </head>
    <main>
    <body>
        <h2>Currency converter</h2>
        <p>Insira um valor em dólar para converter para real</p>
	<label>Valor a converter: $:
	<input 
	  type="number" 
	  id="price-input" 
	  name="price" 
	  step="1" 
	  min="0.99" 
	  inputmode="decimal">
	</label>

        <button id="convertButton">Gerar conversão</button>
        <div id="result"></div>
        <script src="js/main.js"></script>
    </body>
    </main>
